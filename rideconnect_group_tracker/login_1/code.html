<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=Plus+Jakarta+Sans:wght@300..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed": "#00fc40",
                    "on-error-container": "#ffd2c8",
                    "primary-dim": "#00ec3b",
                    "secondary-container": "#006d38",
                    "surface-dim": "#0e0e0e",
                    "tertiary-dim": "#00dbec",
                    "tertiary-fixed": "#0eeafd",
                    "outline": "#767575",
                    "on-primary": "#006413",
                    "secondary-fixed": "#89faaa",
                    "on-tertiary-container": "#005159",
                    "secondary": "#89faaa",
                    "on-secondary-fixed": "#004a24",
                    "surface-container-lowest": "#000000",
                    "on-primary-fixed-variant": "#006513",
                    "surface-bright": "#2c2c2c",
                    "on-surface": "#ffffff",
                    "error-container": "#b92902",
                    "error": "#ff7351",
                    "on-background": "#ffffff",
                    "on-secondary-fixed-variant": "#006a36",
                    "on-primary-container": "#005a10",
                    "surface-container": "#1a1a1a",
                    "inverse-on-surface": "#565555",
                    "inverse-surface": "#fcf9f8",
                    "on-surface-variant": "#adaaaa",
                    "on-primary-fixed": "#00440a",
                    "surface": "#0e0e0e",
                    "background": "#0e0e0e",
                    "secondary-dim": "#7aeb9d",
                    "outline-variant": "#484847",
                    "primary": "#9cff93",
                    "on-secondary": "#005f30",
                    "surface-container-high": "#20201f",
                    "surface-tint": "#9cff93",

                    "surface-container-low": "#131313",
                    "on-tertiary-fixed-variant": "#005c64",
                    "surface-variant": "#262626",
                    "on-secondary-container": "#e3ffe5",
                    "inverse-primary": "#006f16",
                    "surface-container-highest": "#262626",
                    "on-error": "#450900",
                    "on-tertiary-fixed": "#003d42",
                    "tertiary-container": "#0eeafd",
                    "tertiary": "#8af2ff",
                    "primary-container": "#00fc40",

            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-mesh {
            background-image: radial-gradient(circle at 2px 2px, rgba(156, 255, 147, 0.05) 1px, transparent 0);
            background-size: 32px 32px;
        }
        .asymmetric-card {
            border-top-left-radius: 1.5rem;
            border-bottom-right-radius: 1.5rem;
            border-top-right-radius: 0.25rem;
            border-bottom-left-radius: 0.25rem;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface-container-lowest text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- Auth Layout Suppression: Shell is hidden for Transactional screen -->
<main class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Background Precision Textures -->
<div class="absolute inset-0 kinetic-mesh opacity-40 pointer-events-none"></div>
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] bg-primary/5 blur-[150px] rounded-full pointer-events-none"></div>
<div class="w-full max-w-md z-10 space-y-10">
<!-- Brand Identity -->
<header class="text-center space-y-2">
<div class="inline-flex items-center justify-center space-x-2 text-primary mb-4">
<span class="material-symbols-outlined text-4xl" data-icon="pedal_bike">pedal_bike</span>
</div>
<h1 class="font-headline text-5xl font-bold tracking-tighter uppercase italic leading-none">RIDE <span class="text-primary-dim">CONNECT</span></h1>
<p class="text-on-surface-variant font-medium tracking-wide text-sm uppercase">Engineered for Velocity</p>
</header>
<!-- Login Form Card -->
<div class="bg-surface-container-low/60 backdrop-blur-2xl asymmetric-card p-8 shadow-2xl relative overflow-hidden">
<div class="absolute top-0 right-0 w-24 h-24 bg-primary/10 rotate-45 translate-x-12 -translate-y-12"></div>
<form class="space-y-6 relative z-10">
<div class="space-y-4">
<!-- Email Field -->
<div class="space-y-1">
<label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1">Rider Identifier</label>
<div class="group relative">
<input class="w-full bg-surface-container-highest border-none rounded-none rounded-br-xl rounded-tl-xl p-4 text-sm font-headline tracking-tight placeholder:text-outline focus:ring-0 focus:outline-none transition-all border-b-2 border-transparent focus:border-primary" placeholder="EMAIL ADDRESS" type="email"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary group-focus-within:w-full transition-all duration-300"></div>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1">
<label class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant px-1">Access Protocol</label>
<div class="group relative">
<input class="w-full bg-surface-container-highest border-none rounded-none rounded-br-xl rounded-tl-xl p-4 text-sm font-headline tracking-tight placeholder:text-outline focus:ring-0 focus:outline-none transition-all border-b-2 border-transparent focus:border-primary" placeholder="PASSWORD" type="password"/>
<div class="absolute bottom-0 left-0 h-[2px] w-0 bg-primary group-focus-within:w-full transition-all duration-300"></div>
</div>
</div>
</div>
<div class="flex justify-end">
<a class="text-xs font-bold uppercase tracking-tighter text-primary hover:text-primary-fixed-dim transition-colors" href="#">
                            Forgot Password?
                        </a>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-headline font-bold text-lg py-4 asymmetric-card shadow-[0_12px_24px_rgba(156,255,147,0.15)] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center space-x-2" type="submit">
<span>INITIATE LOGIN</span>
<span class="material-symbols-outlined" data-icon="bolt">bolt</span>
</button>
</form>
<!-- Divider -->
<div class="my-8 flex items-center space-x-4">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="text-[10px] font-bold uppercase text-outline tracking-widest">Connect Via</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center space-x-2 bg-surface-container-highest py-3 rounded-none rounded-tl-lg rounded-br-lg hover:bg-surface-bright transition-colors group">
<img alt="" class="w-5 h-5 grayscale group-hover:grayscale-0 transition-all" data-alt="Official Google logo with vibrant colors on transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqFIgziVeKPZjWgED60TzOR6OmqpWmry5Abv5yBUzGq0RqjBX1NonNCtZroW3MBgotjFF45MD1vG6LNPDWJXTpRh6myqWEyFPGA6OX8ppUfzmbaEH3qHJAEn4UxyeUxGT0N6D0SVXlRGw2HKqbk4awhMNqGcdoS9jQsMW5vhTW_5WoHij7uBlAgyML5RVuSDfOnz6zd4eUQ8IUhvl0zSrUSL1LHL20rslnhIb7ZATlEMIcGZwVu62XnU7wYrHZdEyzAhrQVAJ8WnQ"/>
<span class="text-[11px] font-bold uppercase tracking-tight">Google</span>
</button>
<button class="flex items-center justify-center space-x-2 bg-surface-container-highest py-3 rounded-none rounded-tl-lg rounded-br-lg hover:bg-surface-bright transition-colors group">
<span class="material-symbols-outlined text-xl" data-icon="apple">ios</span>
<span class="text-[11px] font-bold uppercase tracking-tight">Apple</span>
</button>
</div>
</div>
<!-- Secondary Action -->
<div class="text-center">
<p class="text-on-surface-variant text-sm">
                    New to the peloton? 
                    <a class="text-on-surface font-bold hover:text-primary transition-colors ml-1 uppercase text-xs tracking-widest underline decoration-primary underline-offset-4" href="#">
                        Join RideConnect
                    </a>
</p>
</div>
</div>
<!-- Atmospheric Visual Element -->
<div class="absolute bottom-12 left-12 hidden lg:block opacity-20">
<div class="flex items-end space-x-1">
<div class="w-1 h-8 bg-primary"></div>
<div class="w-1 h-12 bg-primary"></div>
<div class="w-1 h-16 bg-primary"></div>
<div class="w-1 h-4 bg-primary"></div>
<div class="w-1 h-20 bg-primary"></div>
</div>
<p class="font-headline text-[10px] mt-2 tracking-[0.4em] uppercase text-primary">Telemetry Online</p>
</div>
<div class="absolute top-12 right-12 hidden lg:block text-right opacity-20">
<p class="font-headline text-[10px] tracking-[0.2em] uppercase text-on-surface-variant">System Status</p>
<p class="font-headline text-xl font-bold text-primary">OPTIMIZED</p>
</div>
</main>
<!-- Bottom Navigation Suppressed for Login screen per "Destination Rule" -->
</body></html>
