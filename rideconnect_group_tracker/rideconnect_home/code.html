<html class="dark"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "surface-container-high": "#20201f",
            "on-primary-container": "#005a10",
            "primary-fixed": "#00fc40",
            "error": "#ff7351",
            "inverse-on-surface": "#565555",
            "surface-container-lowest": "#000000",
            "on-primary-fixed": "#00440a",
            "on-secondary": "#005f30",
            "primary-fixed-dim": "#00ec3b",
            "on-surface": "#ffffff",
            "secondary-fixed": "#89faaa",
            "on-secondary-fixed": "#004a24",
            "inverse-surface": "#fcf9f8",
            "surface-variant": "#262626",
            "on-tertiary": "#005b63",
            "tertiary-fixed-dim": "#00dbec",
            "outline": "#767575",
            "primary-dim": "#00ec3b",
            "on-error": "#450900",
            "surface-container": "#1a1a1a",
            "primary-container": "#00fc40",
            "secondary-dim": "#7aeb9d",
            "on-secondary-fixed-variant": "#006a36",
            "secondary-container": "#006d38",
            "surface-dim": "#0e0e0e",
            "tertiary-fixed": "#0eeafd",
            "on-tertiary-fixed": "#003d42",
            "primary": "#9cff93",
            "on-tertiary-fixed-variant": "#005c64",
            "tertiary": "#8af2ff",
            "secondary": "#89faaa",
            "surface-bright": "#2c2c2c",
            "on-error-container": "#ffd2c8",
            "inverse-primary": "#006f16",
            "surface-container-low": "#131313",
            "surface-container-highest": "#262626",
            "error-dim": "#d53d18",
            "outline-variant": "#484847",
            "on-surface-variant": "#adaaaa",
            "on-background": "#ffffff",
            "on-tertiary-container": "#005159",
            "surface": "#0e0e0e",
            "surface-tint": "#9cff93",
            "secondary-fixed-dim": "#7aeb9d",
            "tertiary-dim": "#00dbec",
            "on-primary-fixed-variant": "#006513",
            "background": "#0e0e0e",
            "on-secondary-container": "#e3ffe5"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "fontFamily": {
            "headline": ["Space Grotesk"],
            "body": ["Plus Jakarta Sans"],
            "label": ["Plus Jakarta Sans"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-card {
      background: rgba(19, 19, 19, 0.6);
      backdrop-filter: blur(20px);
    }
    .asymmetric-card {
      border-top-left-radius: 1.5rem;
      border-bottom-right-radius: 1.5rem;
      border-top-right-radius: 0.25rem;
      border-bottom-left-radius: 0.25rem;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#9cff93] active:scale-95 transition-transform cursor-pointer" data-icon="menu">menu</span>
<h1 class="font-['Space_Grotesk'] tracking-tighter uppercase font-bold text-2xl tracking-widest text-[#9cff93]">RIDECONNECT</h1>
</div>
<div class="w-8 h-8 rounded-full overflow-hidden border border-primary/20 active:scale-95 transition-transform cursor-pointer">
<img class="w-full h-full object-cover" data-alt="close-up portrait of a professional cyclist wearing a sleek black helmet and aerodynamic sunglasses with a confident expression" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAci_UvXBbB2al6Ttph-r7dUPRlgTJqN-JxHIUKnz0IMvvxK0Gjsd68U-fdWb2mmPjuJCJCZM4DA8Bsur0GF1IOg3etxWdsp8gPLaVS1chcIAXnJGAU1cJTWKKs5YvCUf9ROfxOJKM0H29bLfzdmB6FGlZuBotvQQMwUogzao2-InMB0Dr9E1ukG72NTpvlb9HI2Z2o8o3i5Suskc-HgykKBPwDEiPY12IbWwSjWGZZIuo9MEft7WLmHirYyWGB6zPaVzLMqLSr_ZM"/>
</div>
</nav>
<main class="pt-20 pb-32 px-6 min-h-screen bg-surface">
<!-- Welcome Header -->
<header class="mb-8">
<p class="text-on-surface-variant font-label text-sm tracking-widest uppercase mb-1">Welcome back,</p>
<h2 class="font-headline text-4xl font-bold tracking-tight">Rider One</h2>
<div class="flex items-center gap-2 mt-2">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-primary text-xs font-bold tracking-widest uppercase">Pro Category • 1,240 km</span>
</div>
</header>
<!-- Map Preview Canvas (Asymmetric Layout) -->
<section class="relative h-48 w-full mb-8 asymmetric-card overflow-hidden group">
<div class="absolute inset-0 grayscale contrast-125 opacity-40">
<img class="w-full h-full object-cover" data-alt="top-down satellite view of a winding asphalt road through a dark pine forest with high contrast lighting" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDPYDA5jd34iQ8HOeLdY4U5C6nGW5WstNhnaHm8wgZleHgAJ4DkJhbNl5X8y5Js8H9O5831pO5w9czzRVu97vB1rBuE41pC_m-WfDMz7O3UkgVULRXzO4xaLqUENVI8jWx319wwlgLvQLsaa3PLNtefsFLYauyepxSSXbDyc5lOh6gsnCDb46Cq6iN-lCYL-U1JBP-VQAlz7TK18JJ2SN7TVWWewaIeDeEMIIu98p8Bc4eJc5soo4HQZoMmk1BecHVNELBZJlwsfNU"/>
</div>
<div class="absolute inset-0 bg-gradient-to-t from-surface to-transparent"></div>
<div class="absolute bottom-4 left-4 flex flex-col">
<span class="text-[10px] font-bold text-primary tracking-[0.2em] uppercase">Active Routes</span>
<span class="font-headline text-lg font-medium">Marin Headlands Loop</span>
</div>
<div class="absolute top-4 right-4 glass-card px-3 py-1 rounded-full border border-white/5">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-sm" data-icon="group">group</span>
<span class="text-[10px] font-bold">12 NEARBY</span>
</div>
</div>
</section>
<!-- Grid Actions -->
<div class="grid grid-cols-2 gap-4">
<!-- Start Ride (Primary CTA) -->
<button class="col-span-2 relative h-40 asymmetric-card bg-gradient-to-br from-primary to-primary-container p-6 flex flex-col justify-between overflow-hidden group active:scale-95 transition-all shadow-[0px_12px_24px_rgba(156,255,147,0.15)]">
<div class="flex justify-between items-start">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="pedal_bike">pedal_bike</span>
<span class="material-symbols-outlined text-on-primary/30 text-8xl absolute -right-4 -top-4 rotate-12 group-hover:rotate-0 transition-transform" data-icon="bolt">bolt</span>
</div>
<div class="flex flex-col items-start">
<span class="text-on-primary font-headline text-3xl font-bold uppercase tracking-tighter">Start Ride</span>
<span class="text-on-primary/70 text-xs font-bold tracking-widest uppercase">Launch Kinetic Tracking</span>
</div>
</button>
<!-- Join Ride -->
<button class="h-40 asymmetric-card bg-surface-container-high p-5 flex flex-col justify-between active:scale-95 transition-all border-l-2 border-primary/20">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="group_add">group_add</span>
<div class="flex flex-col items-start">
<span class="font-headline text-xl font-bold tracking-tight">Join Ride</span>
<p class="text-[10px] text-on-surface-variant font-medium mt-1 leading-tight">Find local pelotons and events</p>
</div>
</button>
<!-- View Riders Map -->
<button class="h-40 asymmetric-card bg-surface-container-high p-5 flex flex-col justify-between active:scale-95 transition-all border-r-2 border-tertiary/20">
<span class="material-symbols-outlined text-tertiary text-2xl" data-icon="explore">explore</span>
<div class="flex flex-col items-start">
<span class="font-headline text-xl font-bold tracking-tight">Riders Map</span>
<p class="text-[10px] text-on-surface-variant font-medium mt-1 leading-tight">Live telemetry of area riders</p>
</div>
</button>
<!-- SOS Button (Prominent) -->
<button class="col-span-2 mt-4 bg-surface-container-highest/50 border border-error/30 py-4 px-6 rounded-full flex items-center justify-between active:scale-95 transition-all group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-error/10 flex items-center justify-center border border-error/40 group-hover:bg-error/20 transition-colors">
<span class="material-symbols-outlined text-error" data-icon="emergency">emergency</span>
</div>
<div class="flex flex-col">
<span class="text-error font-headline font-bold text-lg tracking-widest">SOS</span>
<span class="text-[10px] text-on-surface-variant uppercase font-bold tracking-widest">Emergency Broadcast</span>
</div>
</div>
<span class="material-symbols-outlined text-error/40 group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Stats Ticker (Horizontal) -->
<div class="mt-12 flex gap-4 overflow-x-auto pb-4 no-scrollbar">
<div class="min-w-[140px] p-4 glass-card rounded-xl border border-white/5">
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Weekly</span>
<div class="text-2xl font-headline font-bold text-primary mt-1">142<span class="text-xs ml-1 text-on-surface-variant">KM</span></div>
</div>
<div class="min-w-[140px] p-4 glass-card rounded-xl border border-white/5">
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Elev Gain</span>
<div class="text-2xl font-headline font-bold text-tertiary mt-1">2.4<span class="text-xs ml-1 text-on-surface-variant">K M</span></div>
</div>
<div class="min-w-[140px] p-4 glass-card rounded-xl border border-white/5">
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Avg Speed</span>
<div class="text-2xl font-headline font-bold text-secondary mt-1">28.4<span class="text-xs ml-1 text-on-surface-variant">KM/H</span></div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-black/80 backdrop-blur-2xl rounded-t-[2rem] pt-3 pb-6 px-4 flex justify-around items-center shadow-[0px_-12px_24px_rgba(156,255,147,0.05)]">
<button class="flex flex-col items-center justify-center text-[#9cff93] scale-110 active:scale-90 duration-200 transition-all">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold tracking-widest">HOME</span>
</button>
<button class="flex flex-col items-center justify-center text-[#484847] active:scale-90 duration-200 hover:text-[#9cff93] transition-all">
<span class="material-symbols-outlined" data-icon="pedal_bike">pedal_bike</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold tracking-widest">START</span>
</button>
<button class="flex flex-col items-center justify-center text-[#484847] active:scale-90 duration-200 hover:text-[#9cff93] transition-all">
<span class="material-symbols-outlined" data-icon="group_add">group_add</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold tracking-widest">JOIN</span>
</button>
<button class="flex flex-col items-center justify-center text-[#484847] active:scale-90 duration-200 hover:text-[#9cff93] transition-all">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-['Plus_Jakarta_Sans'] text-[10px] font-bold tracking-widest">MAP</span>
</button>
</nav>
</body></html>
